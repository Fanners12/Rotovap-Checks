<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Attritor PM">
<meta name="theme-color" content="#1a3a2a">
<title>Attritor Mill PM Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--accent:#2dff7a;--accent2:#00e5ff}
:root{--bg:#080c14;--surface:#0d1220;--surface2:#121828;--border:#1a2440;--text:#b8cce0;--text-dim:#4a6080;--sans:'Barlow Condensed',sans-serif;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.btn{font-family:var(--sans);font-weight:700;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:5px;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{filter:brightness(1.15)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;border:1px solid #ff3030;color:#ff3030}.btn-danger:hover{background:rgba(255,48,48,.1)}
header{border-bottom:1px solid var(--border);padding:12px 18px 10px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;background:rgba(0,0,0,.2);position:sticky;top:0;z-index:50}
.header-left h1{font-size:1.6rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#fff;line-height:1}
.header-left h1 span{color:var(--accent)}
.header-left p{font-family:var(--mono);font-size:.62rem;color:var(--text-dim);margin-top:3px;letter-spacing:.1em}
.header-meta{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.field-wrap{display:flex;flex-direction:column;gap:3px}
.field-wrap label{font-family:var(--mono);font-size:.58rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
select,input[type="text"]{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:.95rem;font-weight:600;padding:6px 10px;border-radius:4px;outline:none}
select:focus,input[type="text"]:focus{border-color:var(--accent)}
.machine-selector{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.machine-selector label{font-family:var(--mono);font-size:.65rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.machine-selector select{flex:1;max-width:280px}
.machine-status{font-family:var(--mono);font-size:.62rem;padding:3px 10px;border-radius:99px;border:1px solid;white-space:nowrap}
.ms-green{color:#2dff7a;border-color:rgba(45,255,122,.3);background:rgba(45,255,122,.1)}
.ms-amber{color:#ffcc00;border-color:rgba(255,204,0,.3);background:rgba(255,204,0,.1)}
.ms-red{color:#ff3030;border-color:rgba(255,48,48,.3);background:rgba(255,48,48,.1)}
.progress-bar-wrap{padding:8px 18px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.progress-track{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .4s ease;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.progress-label{font-family:var(--mono);font-size:.65rem;color:var(--text-dim);white-space:nowrap}
.progress-pct{font-family:var(--mono);font-size:.82rem;color:var(--accent);min-width:34px;text-align:right}
main{padding:16px 20px;max-width:920px;margin:0 auto;display:flex;flex-direction:column;gap:16px;padding-bottom:90px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.section-header{display:flex;align-items:center;gap:12px;padding:11px 15px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:background .15s}
.section-header:hover{background:rgba(255,255,255,.03)}
.section-icon{font-size:1.05rem;width:26px;text-align:center;flex-shrink:0}
.section-title{font-size:.95rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;flex:1;color:#fff}
.section-count{font-family:var(--mono);font-size:.65rem;color:var(--text-dim)}
.section-chevron{font-size:.65rem;color:var(--text-dim);transition:transform .2s}
.section.collapsed .section-chevron{transform:rotate(-90deg)}
.section.collapsed .section-body{display:none}
.section-body{padding:4px 0}
.check-item{border-bottom:1px solid rgba(26,36,64,.5)}
.check-item:last-child{border-bottom:none}
.check-row{display:flex;align-items:flex-start;gap:12px;padding:10px 15px;cursor:pointer;transition:background .12s}
.check-row:hover{background:rgba(255,255,255,.02)}
.check-box{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:.7rem}
.check-item.checked .check-box{background:#2dff7a;border-color:#2dff7a;color:#000}
.check-item.flagged .check-box{background:#ff3030;border-color:#ff3030;color:#fff}
.check-item.warn .check-box{background:#ffcc00;border-color:#ffcc00;color:#000}
.check-content{flex:1;min-width:0}
.check-label{font-size:.95rem;font-weight:600;color:var(--text);line-height:1.3}
.check-item.checked .check-label{color:var(--text-dim);text-decoration:line-through}
.check-sub{font-size:.76rem;color:var(--text-dim);margin-top:2px;font-weight:400;line-height:1.4}
.check-actions{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;padding:2px 8px;border-radius:3px;cursor:pointer;border:1px solid;text-transform:uppercase;transition:all .12s}
.tag-pass{color:#2dff7a;border-color:rgba(45,255,122,.3)}.tag-pass:hover{background:rgba(45,255,122,.1)}
.tag-fail{color:#ff3030;border-color:rgba(255,48,48,.3)}.tag-fail:hover{background:rgba(255,48,48,.1)}
.tag-warn{color:#ffcc00;border-color:rgba(255,204,0,.3)}.tag-warn:hover{background:rgba(255,204,0,.1)}
.tag-info{color:var(--accent2,#00e5ff);border-color:rgba(0,229,255,.3)}.tag-info:hover{background:rgba(0,229,255,.1)}
.crit-badge{font-family:var(--mono);font-size:.5rem;letter-spacing:.07em;padding:1px 6px;border-radius:3px;text-transform:uppercase;margin-left:6px;vertical-align:middle;border:1px solid}
.crit-safety{color:#ff6b00;border-color:rgba(255,107,0,.4);background:rgba(255,107,0,.08)}
.crit-high{color:#ff3030;border-color:rgba(255,48,48,.4);background:rgba(255,48,48,.07)}
.crit-med{color:#ffcc00;border-color:rgba(255,204,0,.4);background:rgba(255,204,0,.07)}
.solution-panel{margin:0 15px 10px 47px;background:var(--bg);border:1px solid var(--border);border-left:3px solid #00e5ff;border-radius:0 6px 6px 0;padding:11px 13px;display:none}
.solution-panel.visible{display:block}
.solution-panel.danger-panel{border-left-color:#ff3030}
.solution-panel.warn-panel{border-left-color:#ffcc00}
.solution-panel.pass-panel{border-left-color:#2dff7a}
.solution-panel.hazard-panel{border-left-color:#ff6b00}
.solution-panel h4{font-size:.64rem;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;color:#00e5ff}
.danger-panel h4{color:#ff3030}.warn-panel h4{color:#ffcc00}.pass-panel h4{color:#2dff7a}.hazard-panel h4{color:#ff6b00}
.solution-panel p{font-size:.8rem;color:var(--text);line-height:1.65;margin-bottom:4px}
.notes-row{padding:2px 15px 10px 47px}
.notes-row input{width:100%;font-size:.78rem;padding:5px 10px}
.summary-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,20,.97);border-top:1px solid var(--border);padding:10px 18px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;z-index:20;backdrop-filter:blur(10px)}
.stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.stat-val{font-family:var(--mono);font-size:1.2rem;font-weight:700;line-height:1}
.stat-val.ok{color:#2dff7a}.stat-val.bad{color:#ff3030}.stat-val.warn{color:#ffcc00}.stat-val.total{color:var(--accent)}
.stat-label{font-size:.6rem;font-family:var(--mono);color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.divider{width:1px;height:28px;background:var(--border)}
.summary-actions{margin-left:auto;display:flex;gap:7px}
.complete-banner{display:none;background:linear-gradient(135deg,rgba(45,255,122,.07),rgba(0,229,255,.04));border:1px solid rgba(45,255,122,.2);border-radius:8px;padding:14px 18px;text-align:center}
.complete-banner.visible{display:block}
.complete-banner h3{font-size:1.1rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#2dff7a;margin-bottom:4px}
.complete-banner p{font-family:var(--mono);font-size:.68rem;color:var(--text-dim)}
.log-pm-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.log-pm-modal.hidden{display:none}
.log-pm-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.log-pm-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.log-pm-header h2{font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#fff}
.log-pm-close{background:none;border:none;color:var(--text-dim);font-size:1.1rem;cursor:pointer;padding:4px}
.log-pm-close:hover{color:#ff3030}
.log-pm-body{padding:14px 16px}
.form-group{margin-bottom:11px}
.form-label{font-family:var(--mono);font-size:.6rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:4px}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:.95rem;font-weight:600;padding:7px 11px;border-radius:5px;outline:none}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.log-pm-footer{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end}
.issues-list{display:flex;flex-direction:column;gap:5px;margin-top:5px}
.issue-item{display:flex;gap:7px;align-items:center}
.issue-item input[type="text"]{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:.83rem;padding:5px 9px;border-radius:4px;outline:none}
.issue-item input:focus{border-color:var(--accent)}
.remove-issue{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1rem;padding:2px}
.remove-issue:hover{color:#ff3030}
.add-issue-btn{font-family:var(--mono);font-size:.6rem;color:var(--accent);background:none;border:1px dashed rgba(0,229,255,.3);border-radius:4px;padding:4px 12px;cursor:pointer;width:100%;margin-top:3px;letter-spacing:.08em}
.add-issue-btn:hover{background:rgba(0,229,255,.05)}
@media(max-width:600px){header{padding:10px 14px 8px}main{padding:12px 12px 90px}.solution-panel{margin-left:14px}.notes-row{padding-left:14px}.summary-bar{padding:8px 14px;gap:10px}}
body{background-image:radial-gradient(ellipse at 10% 0%,rgba(45,255,122,.05) 0%,transparent 55%)}
header{background:rgba(45,255,122,.02)}
.hazard-stripe{height:4px;background:repeating-linear-gradient(90deg,#ff6b00 0px,#ff6b00 12px,#1a0a00 12px,#1a0a00 24px)}
.hazard-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.4);border-radius:4px;padding:3px 10px;font-family:var(--mono);font-size:.6rem;color:#ff6b00;letter-spacing:.1em;text-transform:uppercase;margin-top:5px}
</style>
</head>
<body>
<div class="hazard-stripe"></div>
<header>
  <div class="header-left">
    <h1>ATTRITOR <span>MILL PM</span></h1>
    <p>// MONTHLY PREVENTIVE MAINTENANCE // HEXANE / TC BALLS // REV 1.0</p>
    <div class="hazard-tag">⚠ FLAMMABLE SOLVENT — ARGON SUPPRESSION FITTED</div>
  </div>
  <div class="header-meta">
    <div class="field-wrap"><label>Technician</label><input type="text" id="techName" placeholder="Your name" style="width:130px"></div>
    <div class="field-wrap"><label>Date</label><input type="text" id="pmDate" style="width:120px"></div>
  </div>
</header>
<div class="machine-selector">
  <label>Select Machine:</label>
  <select id="machineSelect" onchange="onMachineChange()" style="flex:1;max-width:280px">
    <option value="">— Select Attritor Mill —</option>
  </select>
  <span class="machine-status" id="machineStatusPill"></span>
</div>
<div class="progress-bar-wrap">
  <span class="progress-label">COMPLETION</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-pct" id="progressPct">0%</span>
</div>
<main id="mainContent">
  <div class="complete-banner" id="completeBanner">
    <h3>✔ PM Complete</h3>
    <p>All items addressed. Select a machine and log this PM to update the dashboard.</p>
  </div>
</main>
<div class="summary-bar">
  <div class="stat"><span class="stat-val ok" id="statPass">0</span><span class="stat-label">Pass</span></div>
  <div class="divider"></div>
  <div class="stat"><span class="stat-val bad" id="statFail">0</span><span class="stat-label">Issues</span></div>
  <div class="divider"></div>
  <div class="stat"><span class="stat-val warn" id="statWarn">0</span><span class="stat-label">Monitor</span></div>
  <div class="divider"></div>
  <div class="stat"><span class="stat-val total" id="statTotal">0</span><span class="stat-label">Total</span></div>
  <div class="summary-actions">
    <button class="btn btn-danger" onclick="resetAll()">Reset</button>
    <button class="btn btn-primary" onclick="openLogPm()" style="background:var(--accent);color:#000">✓ Log PM</button>
  </div>
</div>
<div class="log-pm-modal hidden" id="logPmModal">
  <div class="log-pm-box">
    <div class="log-pm-header"><h2 id="logTitle">Log PM</h2><button class="log-pm-close" onclick="closeLogModal()">✕</button></div>
    <div class="log-pm-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">PM Date</label><input type="date" class="form-input" id="logDate"></div>
        <div class="form-group"><label class="form-label">Technician</label><input type="text" class="form-input" id="logTech" placeholder="Name"></div>
      </div>
      <div class="form-group"><label class="form-label">Result</label>
        <select class="form-input" id="logResult"><option value="pass">All Clear</option><option value="issues">Issues Found</option><option value="partial">Partial</option></select>
      </div>
      <div class="form-group"><label class="form-label">Issues / Notes</label>
        <div class="issues-list" id="logIssues"></div>
        <button class="add-issue-btn" onclick="addLogIssue()">+ Add Issue</button>
      </div>
    </div>
    <div class="log-pm-footer">
      <button class="btn btn-ghost" onclick="closeLogModal()">Cancel</button>
      <button class="btn" onclick="saveLog()" style="background:var(--accent);color:#000;font-family:var(--sans);font-weight:700;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:5px;border:none;cursor:pointer">Log PM Complete</button>
    </div>
  </div>
</div>
<script>

const MACHINE_TYPE = 'Attritor Mill';
const BUILTIN_MACHINES = [
  {id:'a1',name:'Attritor Mill 1',type:'Attritor Mill',frequency:30,lastPm:null,checklistUrl:'',notes:'27.4kg TC balls'},
  {id:'a2',name:'Attritor Mill 2',type:'Attritor Mill',frequency:30,lastPm:null,checklistUrl:'',notes:'27.4kg TC balls'},
  {id:'a3',name:'Attritor Mill 3',type:'Attritor Mill',frequency:30,lastPm:null,checklistUrl:'',notes:'27.4kg TC balls'},
  {id:'a4',name:'Attritor Mill 4',type:'Attritor Mill',frequency:30,lastPm:null,checklistUrl:'',notes:'27.4kg TC balls'},
  {id:'a5',name:'Attritor Mill 5',type:'Attritor Mill',frequency:30,lastPm:null,checklistUrl:'',notes:'27.4kg TC balls'},
];;
const SECTIONS = [
  {icon:'🔥',title:'Argon Fire Suppression System',items:[
    {label:'Confirm argon cylinder pressure is within operational range',crit:'safety',sub:'Check pressure gauge on argon cylinder — record reading.',solution:{pass:'Cylinder pressure within operational range. Reading logged.',fail:{title:'🔴 CRITICAL — Replace Argon Cylinder Before Next Run',body:'A low or empty argon cylinder means the fire suppression system will not function in a hexane ignition event. The mill must not be operated until cylinder is replaced and system re-tested.'},warn:{title:'🟡 Pressure Low — Order Replacement Now',body:'Pressure above minimum but should be replaced at next opportunity. Order now and swap before pressure drops to minimum. Log reading and trend.'}}},
    {label:'Test fire/smoke detectors inside mill enclosure',crit:'safety',sub:'Use approved test spray or heat source. Each detector must respond within spec.',solution:{pass:'All detectors responded correctly within specification.',fail:{title:'🔴 CRITICAL — Do Not Operate Until Detector Fixed',body:'A non-functioning fire detector in a hexane environment is a serious safety failure.\n• Check detector wiring and connections\n• Clean detector head — hexane residue coats sensing element\n• If cleaning does not restore function, replace detector unit\n• Re-test after replacement before returning to service'}}},
    {label:'Verify argon discharge nozzles are clear and unobstructed',crit:'safety',sub:'Inspect all nozzles inside the enclosure for powder buildup or damage.',solution:{pass:'All nozzles are clear, undamaged, and correctly directed.',fail:{title:'🔴 Clear Nozzle Blockage Before Next Run',body:'A blocked nozzle will prevent argon reaching the fire source.\n• Clean blocked nozzles with dry compressed air\n• If physically damaged, replace nozzle and check supply pipe\n• Verify discharge pattern after cleaning'}}},
    {label:'Confirm argon system control panel shows no fault codes',crit:'safety',sub:'Check control panel display. All indicators should show normal/standby status.',solution:{pass:'Control panel shows normal standby status with no fault codes.',fail:{title:'🔴 Investigate and Clear Fault Before Operation',body:'Any fault code must be investigated and cleared before mill is operated.\n• Note exact fault code and refer to system manual\n• Common faults: detector loop fault, low pressure fault, solenoid fault\n• Contact suppression system service provider if cannot clear on-site'}}},
    {label:'Confirm suppression system returned to AUTO mode after PM',crit:'safety',sub:'System must be switched back from manual/maintenance mode before mill is started.',solution:{pass:'System confirmed in AUTO/armed mode. Ready for operation.',fail:{title:'🔴 DO NOT START MILL — System Not Armed',body:'Starting mill with argon suppression in manual mode leaves process completely unprotected in event of fire. Switch back to AUTO mode and confirm armed/ready status.'}}}
  ]},
  {icon:'🏭',title:'Mill Enclosure & Safety Doors',items:[
    {label:'Inspect enclosure door seals and gaskets for integrity',crit:'safety',sub:'Check door seals for cracks or gaps. Hexane vapour must not escape enclosure.',solution:{pass:'Door seals are intact, fully compressed when closed, no deterioration.',fail:{title:'🔴 Replace Door Seals — Vapour Containment Compromised',body:'Damaged door seals allow hexane vapour to escape creating flammable atmosphere.\n• Replace with Viton or PTFE-faced seals — standard EPDM not suitable for hexane\n• After replacement, perform vapour test to confirm containment'}}},
    {label:'Test door interlock switches — mill must stop when door opened',crit:'safety',sub:'Open door during standby and confirm interlock signal registered by control system.',solution:{pass:'Door interlock functions correctly — control system registers door open signal.',fail:{title:'🔴 DO NOT OPERATE — Door Interlock Failure',body:'A failed door interlock means mill could run when enclosure is opened.\n• Check interlock switch alignment and wiring\n• Clean switch contacts — powder contamination is common cause\n• Replace switch if contacts worn or damaged\n• Verify interlock logic in the control system'}}},
    {label:'Check enclosure for powder buildup and hexane residue',crit:'high',sub:'Inspect floor, walls, and ceiling. Accumulated powder and residue is a fire risk.',solution:{pass:'Enclosure interior clean with no significant powder accumulation or liquid residue.',fail:{title:'🔴 Deep Clean Required Before Next Run',body:'Accumulated powder and hexane residue creates elevated fire and explosion risk.\n• Use anti-static vacuum to remove loose powder — do not use compressed air\n• Wipe down surfaces with solvent-compatible cloths\n• Dispose of cleaning materials as hazardous waste'}}},
    {label:'Verify enclosure ventilation system is functioning',crit:'safety',sub:'Confirm extraction fan is running and airflow is sufficient to maintain vapour below LEL.',solution:{pass:'Ventilation system running, airflow confirmed at all extraction points.',fail:{title:'🔴 DO NOT OPERATE — Ventilation Failure',body:'Without adequate ventilation hexane vapour will accumulate to flammable concentrations.\n• Check fan motor and drive\n• Inspect ducting for blockages\n• The mill must not be operated without confirmed ventilation function'}}}
  ]},
  {icon:'⚙️',title:'Mill Drive & Mechanical',items:[
    {label:'Inspect main drive shaft seal for hexane leakage',crit:'high',sub:'Check around shaft entry point for wet residue, crystallised deposits, or staining.',solution:{pass:'Shaft seal area is dry with no evidence of leakage or residue.',fail:{title:'🔴 Replace Shaft Seal — Fire Risk',body:'A leaking shaft seal allows hexane to escape onto hot motor components creating ignition risk.\n• Take mill out of service immediately\n• Replace shaft seal with grade compatible with hexane and shaft speed\n• Clean all leaked hexane before restarting'}}},
    {label:'Check drive motor bearings — listen for noise, check for heat',crit:'high',sub:'Run at low speed for 2 minutes and listen. Motor housing should not be excessively hot.',solution:{pass:'Motor runs quietly with no unusual noise. Temperature normal.',fail:{title:'🔴 Investigate Motor Bearing Issue',body:'In a hexane environment, a failing bearing generating heat or sparks is an ignition risk.\n• Stop mill immediately if grinding detected\n• Check bearing temperature with infrared thermometer\n• If bearing running hot (>80°C above ambient), replace before next run'},warn:{title:'🟡 Minor Noise — Monitor Closely',body:'Slight noise may indicate early bearing wear. Lubricate and re-check at next run. In a hexane environment do not allow bearings to run to failure.'}}},
    {label:'Inspect agitator shaft and arms for wear or damage',crit:'high',sub:'Inspect agitator arms for wear from TC media contact. Check for cracks.',solution:{pass:'Agitator shaft and arms intact with acceptable wear levels.',fail:{title:'🔴 Replace Worn Agitator Components',body:'Severely worn agitator arms reduce milling efficiency and can shed metal contamination into product.\n• Measure remaining thickness against minimum wear spec\n• Replace worn arms with correct grade material compatible with TC media\n• Log wear measurement and replacement'},warn:{title:'🟡 Wear Within Range — Log and Monitor',body:'Note wear measurement in log. Compare against previous readings. Plan replacement before next PM if wear rate indicates limit will be reached.'}}},
    {label:'Inspect mill vessel/tank lining for wear or damage',crit:'high',sub:'Check internal lining for cracks, spalling, or exposed base material.',solution:{pass:'Lining intact with no cracks, spalling, or exposed substrate.',fail:{title:'🔴 Reline or Replace Tank Before Next Run',body:'A damaged lining exposes base metal to hexane and TC media causing metal contamination in product.\n• Assess extent of damage — spot repair vs full reline\n• Use correct lining material rated for hexane and abrasive media\n• Allow full cure time before returning to service'}}},
    {label:'Verify tungsten carbide ball charge — weigh and confirm 27.4kg',crit:'high',sub:'Remove and weigh TC ball charge. Loss indicates excessive wear or media loss.',solution:{pass:'TC ball charge confirmed at 27.4kg (±0.5kg). Media condition acceptable.',fail:{title:'🔴 Investigate Media Loss and Top Up',body:'Significant media loss (>1kg) indicates excessive wear or loss during operation.\n• Inspect discharge screens and seals for media loss points\n• Top up with new TC balls to restore 27.4kg charge\n• Investigate root cause — feed material contamination can cause accelerated wear\n• Log weight, top-up amount, and findings'},warn:{title:'🟡 Minor Media Loss — Top Up',body:'Loss of 0.5–1kg is within normal wear range. Top up to 27.4kg with matching TC balls. Log weight and top-up amount.'}}}
  ]},
  {icon:'💧',title:'Hexane System & Fluid Handling',items:[
    {label:'Inspect all hexane pipework, hoses, and connections for leaks',crit:'safety',sub:'Trace all hexane lines from supply to mill and to recovery system.',solution:{pass:'All hexane pipework is dry with no leaks, staining, or residue at any joint.',fail:{title:'🔴 STOP — Fix Hexane Leak Before Any Operation',body:'A hexane leak is an immediate fire and explosion hazard.\n• Isolate hexane supply immediately\n• Do not use open flame or spark-producing tools\n• Repair or replace leaking fitting, hose, or connection\n• Perform leak test before returning to service'}}},
    {label:'Check hexane recovery/distillation system is functioning',crit:'high',sub:'Verify condenser cooling, collection vessel level, and automated controls.',solution:{pass:'Recovery system operating correctly. Condenser cooling confirmed.',fail:{title:'🔴 Service Recovery System Before Next Run',body:'A non-functioning hexane recovery system means solvent vapour vents to atmosphere increasing fire risk.\n• Check condenser cooling water flow\n• Inspect collection vessel vent for blockage\n• Do not run the mill until recovery is functional'}}},
    {label:'Inspect hexane storage — no leaks, correct bunding, labels in place',crit:'safety',sub:'Check storage drum/IBC for leaks. Confirm bund is clear. Verify COSHH labels.',solution:{pass:'Storage area clean, bund clear and adequate, all containers correctly labelled.',fail:{title:'🔴 Address Storage Non-Compliance Immediately',body:'Non-compliant hexane storage is a regulatory and safety issue.\n• Any leaking container must be isolated and contents transferred\n• Clear bund of accumulated liquid — dispose as hazardous waste\n• Replace missing or damaged COSHH labels'}}}
  ]},
  {icon:'🔩',title:'Seals, Gaskets & Discharge',items:[
    {label:'Inspect mill lid/cover seal and clamp mechanism',crit:'high',sub:'Check lid seal for compression set or damage. Verify clamp torque is achievable.',solution:{pass:'Lid seal in good condition and seals evenly. Clamp mechanism operates correctly.',fail:{title:'🔴 Replace Lid Seal',body:'A leaking lid seal allows hexane vapour escape and can allow air ingress.\n• Replace with Viton or equivalent hexane-compatible seal\n• Clean lid flange face thoroughly before fitting new seal\n• Torque evenly in cross pattern to manufacturer spec'}}},
    {label:'Check discharge valve and screen for wear or blockage',crit:'high',sub:'Inspect discharge screen mesh for damage. Check valve seating for wear.',solution:{pass:'Discharge screen intact with correct mesh size. Valve seats correctly.',fail:{title:'🔴 Replace Damaged Screen or Service Valve',body:'A damaged discharge screen can allow TC media to pass into product — serious contamination issue.\n• Replace screen with correct mesh size — document mesh specification\n• After replacement, test with clean solvent before production run'}}},
    {label:'Inspect all gaskets on flanged connections',crit:'med',sub:'Check accessible flanged connections for weeping or compressed-out gaskets.',solution:{pass:'All flanged joints dry with no signs of leakage.',fail:{title:'🔴 Replace Leaking Gaskets',body:'Leaking flanged joints on hexane service must be repaired immediately.\n• Use only hexane-compatible gasket material — PTFE or Viton\n• Do not over-torque flange bolts — follow torque specification\n• If bolts corroded or stretched, replace before re-use'}}}
  ]},
  {icon:'⚡',title:'Electrical & Earthing',items:[
    {label:'Verify mill and all equipment is correctly earthed/bonded',crit:'safety',sub:'Check earth bonding straps on mill vessel, pipework, and recovery system.',solution:{pass:'All earth bonding connections intact, secure, and continuity confirmed.',fail:{title:'🔴 CRITICAL — Restore Earthing Before Operation',body:'In a hexane environment, static discharge from an unearthed vessel or pipework can ignite vapour.\n• Re-attach any disconnected earth bonding straps\n• Replace corroded or damaged connections\n• Check continuity with multi-meter — resistance should be <1 ohm to earth\n• Do not operate until all earthing confirmed'}}},
    {label:'Inspect ATEX-rated equipment inside and around enclosure',crit:'safety',sub:'Check ATEX junction boxes, switches, and sensors are sealed with no damage.',solution:{pass:'All ATEX equipment intact, sealed, and showing no physical damage.',fail:{title:'🔴 CRITICAL — Damaged ATEX Equipment Must Be Replaced',body:'Damaged ATEX equipment inside a Zone 1/Zone 2 hazardous area is an immediate ignition source risk.\n• Any cracked or open ATEX enclosure must be replaced with certified ATEX equipment\n• Do not use standard (non-ATEX) replacement parts inside the hazardous zone'}}},
    {label:'Check control panel for fault codes or alarm history',crit:'high',sub:'Review control panel display and alarm log. Note any recurring faults.',solution:{pass:'No active faults. Alarm history reviewed and previous faults are resolved.',fail:{title:'🔴 Investigate and Clear Faults',body:'Active faults must be investigated before operation.\n• Document all fault codes from alarm log\n• Investigate root cause — do not just acknowledge and clear\n• Recurring faults indicate an underlying issue needing engineering attention'}}}
  ]},
  {icon:'🧹',title:'General & Safety',items:[
    {label:'Clean external surfaces of mill and surrounding area',crit:'med',sub:'Remove powder accumulation and solvent residue from external mill surfaces.',solution:{pass:'External surfaces and surrounding floor area are clean.',fail:{title:'🟡 Clean Before Next Run',body:'Powder and hexane residue accumulation on external surfaces is a fire risk.\n• Use anti-static vacuum for powder\n• Use appropriate wipes for solvent residue\n• Dispose of all cleaning materials as chemical waste'}}},
    {label:'Confirm all PPE is available and in serviceable condition',crit:'safety',sub:'Check chemical-resistant gloves, safety glasses, face shield, anti-static clothing, emergency shower access.',solution:{pass:'All required PPE present, undamaged, within service life. Emergency shower accessible.',fail:{title:'🔴 Replace Missing or Damaged PPE Before Operation',body:'Operating with hexane without correct PPE is unacceptable.\n• Replace damaged or expired PPE immediately\n• Gloves must be compatible with hexane — check chemical resistance rating\n• Anti-static clothing must be used — no synthetic fabrics\n• Confirm emergency shower and eyewash is accessible and functional'}}},
    {label:'Confirm COSHH/SDS documentation is current at the machine',crit:'med',sub:'Hexane SDS must be current version and physically accessible at workstation.',solution:{pass:'Current SDS for hexane and other materials accessible at workstation.',fail:{title:'🟡 Update Documentation',body:'Print and laminate current SDS for hexane. Post at machine workstation. Check SDS revision date — update if more than 3 years old.'}}},
    {label:'Log PM — record unit, date, tech, TC ball weight, findings',crit:'med',sub:'Record all findings, corrective actions, and next PM due date.',solution:{pass:'PM record completed, signed, and filed. Next PM date scheduled.',fail:{title:'🟡 Complete PM Record',body:'Complete the log with all findings, actions taken, parts replaced, TC ball weight recorded, and any outstanding items. Confirm next PM due date.'}}}
  ]}
];

// ── Shared Data Layer (reads/writes same localStorage as dashboard) ──
const DB = {
  getMachines: () => JSON.parse(localStorage.getItem('pm_machines') || '[]'),
  getHistory: () => JSON.parse(localStorage.getItem('pm_history') || '[]'),
  save: (m, h) => {
    localStorage.setItem('pm_machines', JSON.stringify(m));
    localStorage.setItem('pm_history', JSON.stringify(h));
  },
  logPM: (machineId, machineName, tech, result, issues, date) => {
    const machines = DB.getMachines();
    const idx = machines.findIndex(m => m.id === machineId);
    if (idx >= 0) { machines[idx].lastPm = date; }
    const history = DB.getHistory();
    history.unshift({ id: 'log_' + Date.now(), machineId, machineName, date, tech, result, issues });
    DB.save(machines, history);
  }
};

// ── State ──────────────────────────────────────────
const state = {};
let selectedMachineId = null;

function initState() {
  SECTIONS.forEach((sec, si) => {
    sec.items.forEach((_, ii) => {
      const key = `${si}-${ii}`;
      if (!state[key]) state[key] = { status: 'pending', note: '' };
    });
  });
}

function resetState() {
  Object.keys(state).forEach(k => { state[k] = { status: 'pending', note: '' }; });
}

// ── Machine Selector ───────────────────────────────
function populateMachineSelector() {
  const sel = document.getElementById('machineSelect');
  let machines = DB.getMachines().filter(m => m.type === MACHINE_TYPE);
  if (machines.length === 0) {
    machines = BUILTIN_MACHINES;
    const all = DB.getMachines();
    BUILTIN_MACHINES.forEach(m => { if (!all.find(x => x.id === m.id)) all.push(m); });
    DB.save(all, DB.getHistory());
  }
  sel.innerHTML = '<option value="">— Select machine —</option>' +
    machines.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  const params = new URLSearchParams(window.location.search);
  const preselect = params.get('machine');
  if (preselect) { sel.value = preselect; onMachineChange(); }
}

function onMachineChange() {
  const sel = document.getElementById('machineSelect');
  selectedMachineId = sel.value || null;
  updateMachineStatus();
}

function updateMachineStatus() {
  const statusEl = document.getElementById('machineStatusPill');
  if (!selectedMachineId) { statusEl.textContent = ''; statusEl.className = 'machine-status'; return; }
  const m = DB.getMachines().find(x => x.id === selectedMachineId);
  if (!m) return;
  const last = m.lastPm ? new Date(m.lastPm) : null;
  const today = new Date(); today.setHours(0,0,0,0);
  if (!last) { statusEl.textContent = 'No PM recorded'; statusEl.className = 'machine-status ms-red'; return; }
  last.setHours(0,0,0,0);
  const daysSince = Math.floor((today - last) / 86400000);
  const daysUntil = m.frequency - daysSince;
  if (daysUntil < 0) { statusEl.textContent = `${Math.abs(daysUntil)}d overdue`; statusEl.className = 'machine-status ms-red'; }
  else if (daysUntil <= 7) { statusEl.textContent = `Due in ${daysUntil}d`; statusEl.className = 'machine-status ms-amber'; }
  else { statusEl.textContent = `Next PM in ${daysUntil}d`; statusEl.className = 'machine-status ms-green'; }
}

// ── Checklist rendering ────────────────────────────
function renderSections() {
  const main = document.getElementById('mainContent');
  main.querySelectorAll('.section').forEach(el => el.remove());
  const banner = document.getElementById('completeBanner');
  SECTIONS.forEach((sec, si) => {
    const div = document.createElement('div');
    div.className = 'section'; div.id = `sec-${si}`;
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<span class="section-icon">${sec.icon}</span><span class="section-title">${sec.title}</span><span class="section-count" id="sec-count-${si}">0/${sec.items.length}</span><span class="section-chevron">▼</span>`;
    hdr.addEventListener('click', () => div.classList.toggle('collapsed'));
    div.appendChild(hdr);
    const body = document.createElement('div'); body.className = 'section-body';
    sec.items.forEach((item, ii) => {
      const key = `${si}-${ii}`;
      const s = state[key];
      const statusClass = s.status === 'pass' ? 'checked' : s.status === 'fail' ? 'flagged' : s.status === 'warn' ? 'warn' : '';
      const checkSymbol = s.status === 'pass' ? '✓' : s.status === 'fail' ? '✕' : s.status === 'warn' ? '!' : '';
      const critBadge = item.crit === 'safety' ? '<span class="crit-badge crit-safety">Safety Critical</span>' : item.crit === 'high' ? '<span class="crit-badge crit-high">Critical</span>' : item.crit === 'med' ? '<span class="crit-badge crit-med">Important</span>' : '';
      const warnTag = item.solution.warn ? `<span class="tag tag-warn" onclick="event.stopPropagation();setStatus('${key}','warn')">! Monitor</span>` : '';
      const itemDiv = document.createElement('div');
      itemDiv.className = `check-item ${statusClass}`; itemDiv.id = `item-${key}`;
      itemDiv.innerHTML = `<div class="check-row" onclick="toggleSolution('${key}')"><div class="check-box">${checkSymbol}</div><div class="check-content"><div class="check-label">${item.label}${critBadge}</div><div class="check-sub">${item.sub}</div><div class="check-actions"><span class="tag tag-pass" onclick="event.stopPropagation();setStatus('${key}','pass')">✓ Pass</span><span class="tag tag-fail" onclick="event.stopPropagation();setStatus('${key}','fail')">✕ Issue</span>${warnTag}<span class="tag tag-info" onclick="event.stopPropagation();toggleSolution('${key}')">ℹ Solution</span></div></div></div><div class="solution-panel ${getSolClass(item,s.status)}" id="sol-${key}">${getSolHTML(item,s.status)}</div><div class="notes-row"><input type="text" placeholder="Notes..." value="${s.note}" oninput="saveNote('${key}',this.value)"></div>`;
      body.appendChild(itemDiv);
    });
    div.appendChild(body);
    main.insertBefore(div, banner);
  });
  updateProgress();
}

function getSolClass(item,status){
  if(status==='fail')return(item.crit==='safety'?'hazard-panel':'danger-panel')+' visible';
  if(status==='warn')return'warn-panel visible';
  if(status==='pass')return'pass-panel visible';
  return'';
}
function getSolHTML(item,status){
  if(status==='pass'&&item.solution.pass)return`<h4>✔ Pass Confirmed</h4><p>${item.solution.pass}</p>`;
  if(status==='fail'&&item.solution.fail)return`<h4>${item.solution.fail.title}</h4><p style="white-space:pre-line">${item.solution.fail.body}</p>`;
  if(status==='warn'&&item.solution.warn)return`<h4>${item.solution.warn.title}</h4><p>${item.solution.warn.body}</p>`;
  let h='';
  if(item.solution.pass)h+=`<h4>✔ Pass Criteria</h4><p>${item.solution.pass}</p>`;
  if(item.solution.fail)h+=`<h4 style="margin-top:10px">${item.solution.fail.title}</h4><p style="white-space:pre-line">${item.solution.fail.body}</p>`;
  if(item.solution.warn)h+=`<h4 style="margin-top:10px">${item.solution.warn.title}</h4><p>${item.solution.warn.body}</p>`;
  return h;
}
function toggleSolution(key){document.getElementById(`sol-${key}`).classList.toggle('visible');}
function setStatus(key,status){
  const[si,ii]=key.split('-').map(Number);
  const item=SECTIONS[si].items[ii];
  state[key].status=status;
  const itemDiv=document.getElementById(`item-${key}`);
  itemDiv.className=`check-item ${status==='pass'?'checked':status==='fail'?'flagged':status==='warn'?'warn':''}`;
  itemDiv.querySelector('.check-box').textContent=status==='pass'?'✓':status==='fail'?'✕':status==='warn'?'!':'';
  const panel=document.getElementById(`sol-${key}`);
  panel.className=`solution-panel ${getSolClass(item,status)}`;
  panel.innerHTML=getSolHTML(item,status);
  updateProgress();
}
function saveNote(key,val){state[key].note=val;}
function updateProgress(){
  let pass=0,fail=0,warn=0,total=0;
  SECTIONS.forEach((sec,si)=>{
    let secDone=0;
    sec.items.forEach((_,ii)=>{
      const s=state[`${si}-${ii}`].status;total++;
      if(s==='pass'){pass++;secDone++;}else if(s==='fail'){fail++;secDone++;}else if(s==='warn'){warn++;secDone++;}
    });
    const el=document.getElementById(`sec-count-${si}`);if(el)el.textContent=`${secDone}/${sec.items.length}`;
  });
  const done=pass+fail+warn,pct=total>0?Math.round((done/total)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('statPass').textContent=pass;
  document.getElementById('statFail').textContent=fail;
  document.getElementById('statWarn').textContent=warn;
  document.getElementById('statTotal').textContent=total;
  const banner=document.getElementById('completeBanner');
  if(done===total&&total>0){banner.classList.add('visible');}else{banner.classList.remove('visible');}
}

// ── Log PM ─────────────────────────────────────────
function openLogPm(){
  if(!selectedMachineId){alert('Please select a machine first');return;}
  const m=DB.getMachines().find(x=>x.id===selectedMachineId);
  document.getElementById('logTitle').textContent=`Log PM — ${m?m.name:''}`;
  document.getElementById('logDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('logTech').value='';
  document.getElementById('logResult').value='pass';
  document.getElementById('logIssues').innerHTML='';
  // Auto-populate issues from flagged items
  const flagged=[];
  SECTIONS.forEach((sec,si)=>{sec.items.forEach((item,ii)=>{if(state[`${si}-${ii}`].status==='fail')flagged.push(item.label);});});
  flagged.forEach(f=>{addLogIssue(f);});
  document.getElementById('logPmModal').classList.remove('hidden');
}
function addLogIssue(text=''){
  const item=document.createElement('div');item.className='issue-item';
  item.innerHTML=`<input type="text" placeholder="Describe the issue..." value="${text}"><button class="remove-issue" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('logIssues').appendChild(item);
}
function saveLog(){
  const m=DB.getMachines().find(x=>x.id===selectedMachineId);if(!m)return;
  const date=document.getElementById('logDate').value;
  const tech=document.getElementById('logTech').value.trim();
  const result=document.getElementById('logResult').value;
  const issues=Array.from(document.querySelectorAll('#logIssues input')).map(i=>i.value.trim()).filter(Boolean);
  DB.logPM(selectedMachineId,m.name,tech,result,issues,date);
  updateMachineStatus();
  document.getElementById('logPmModal').classList.add('hidden');
  alert(`PM logged for ${m.name}. Dashboard will update automatically.`);
}
function resetAll(){
  if(!confirm('Reset all checks?'))return;
  resetState();renderSections();
}
function closeLogModal(){document.getElementById('logPmModal').classList.add('hidden');}
const today = new Date();
document.getElementById('pmDate').value = today.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
initState();
populateMachineSelector();
renderSections();
</script>
