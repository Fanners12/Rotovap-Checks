<title>Rotovap PM Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111720;
    --surface2: #161d28;
    --border: #1e2d40;
    --accent: #00c2ff;
    --accent2: #00ff9d;
    --warn: #ffb800;
    --danger: #ff4757;
    --text: #c8d8e8;
    --text-dim: #5a7a96;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(0,194,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 100%, rgba(0,255,157,0.04) 0%, transparent 60%);
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    background: rgba(0,194,255,0.02);
  }

  .header-left h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    line-height: 1;
  }

  .header-left h1 span { color: var(--accent); }

  .header-left p {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.12em;
  }

  .header-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .machine-select-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .machine-select-wrap label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  select, input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  .btn {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover { background: #33cfff; }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
  }

  .btn-danger:hover { background: rgba(255,71,87,0.1); }

  .btn-success {
    background: var(--accent2);
    color: #000;
  }

  .btn-success:hover { background: #33ffb3; }

  .progress-bar-wrap {
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .progress-pct {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  main {
    padding: 20px 24px;
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .section-header:hover { background: rgba(0,194,255,0.06); }

  .section-icon {
    font-size: 1.1rem;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex: 1;
    color: #fff;
  }

  .section-count {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .section-chevron {
    font-size: 0.7rem;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  .section-body { padding: 4px 0; }

  .check-item {
    border-bottom: 1px solid rgba(30,45,64,0.5);
  }

  .check-item:last-child { border-bottom: none; }

  .check-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.12s;
  }

  .check-row:hover { background: rgba(0,194,255,0.04); }

  .check-box {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 0.7rem;
  }

  .check-item.checked .check-box {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #000;
  }

  .check-item.flagged .check-box {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
  }

  .check-item.warn .check-box {
    background: var(--warn);
    border-color: var(--warn);
    color: #000;
  }

  .check-content { flex: 1; min-width: 0; }

  .check-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .check-item.checked .check-label {
    color: var(--text-dim);
    text-decoration: line-through;
  }

  .check-sub {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 2px;
    font-weight: 400;
  }

  .check-actions {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid;
    text-transform: uppercase;
    transition: all 0.12s;
  }

  .tag-pass { color: var(--accent2); border-color: rgba(0,255,157,0.3); }
  .tag-pass:hover, .check-item.checked .tag-pass { background: rgba(0,255,157,0.1); }

  .tag-fail { color: var(--danger); border-color: rgba(255,71,87,0.3); }
  .tag-fail:hover, .check-item.flagged .tag-fail { background: rgba(255,71,87,0.1); }

  .tag-warn { color: var(--warn); border-color: rgba(255,184,0,0.3); }
  .tag-warn:hover, .check-item.warn .tag-warn { background: rgba(255,184,0,0.1); }

  .tag-info { color: var(--accent); border-color: rgba(0,194,255,0.3); }
  .tag-info:hover { background: rgba(0,194,255,0.1); }

  /* Solution panel */
  .solution-panel {
    margin: 0 16px 12px 48px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 12px 14px;
    display: none;
  }

  .solution-panel.visible { display: block; }
  .solution-panel.danger-panel { border-left-color: var(--danger); }
  .solution-panel.warn-panel { border-left-color: var(--warn); }

  .solution-panel h4 {
    font-size: 0.7rem;
    font-family: var(--mono);
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .danger-panel h4 { color: var(--danger); }
  .warn-panel h4 { color: var(--warn); }

  .solution-panel p {
    font-size: 0.82rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 4px;
  }

  .solution-panel ul {
    padding-left: 16px;
    margin-top: 4px;
  }

  .solution-panel li {
    font-size: 0.82rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 2px;
  }

  .notes-row {
    padding: 4px 16px 10px 48px;
  }

  .notes-row input {
    width: 100%;
    font-size: 0.8rem;
    padding: 5px 10px;
  }

  /* Summary footer */
  .summary-bar {
    position: sticky;
    bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-val.ok { color: var(--accent2); }
  .stat-val.bad { color: var(--danger); }
  .stat-val.warn { color: var(--warn); }
  .stat-val.total { color: var(--accent); }

  .stat-label {
    font-size: 0.65rem;
    font-family: var(--mono);
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .summary-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .divider { width: 1px; height: 32px; background: var(--border); }

  /* Completed banner */
  .complete-banner {
    display: none;
    background: linear-gradient(135deg, rgba(0,255,157,0.08), rgba(0,194,255,0.06));
    border: 1px solid rgba(0,255,157,0.2);
    border-radius: 8px;
    padding: 16px 20px;
    text-align: center;
  }

  .complete-banner.visible { display: block; }

  .complete-banner h3 {
    font-size: 1.2rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 4px;
  }

  .complete-banner p {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  @media (max-width: 600px) {
    header { padding: 14px 16px 12px; }
    main { padding: 14px 12px; }
    .summary-bar { padding: 10px 16px; gap: 12px; }
    .notes-row { padding-left: 16px; }
    .solution-panel { margin-left: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>ROTOVAP <span>PM</span> CHECKLIST</h1>
    <p>// MONTHLY PREVENTIVE MAINTENANCE // REV 1.0</p>
  </div>
  <div class="header-meta">
    <div class="machine-select-wrap">
      <label>Machine</label>
      <select id="machineSelect">
        <option>Unit 1</option>
        <option>Unit 2</option>
        <option>Unit 3</option>
      </select>
    </div>
    <div class="machine-select-wrap">
      <label>Technician</label>
      <input type="text" id="techName" placeholder="Your name" style="width:130px">
    </div>
    <div class="machine-select-wrap">
      <label>Date</label>
      <input type="text" id="pmDate" style="width:120px">
    </div>
  </div>
</header>

<div class="progress-bar-wrap">
  <span class="progress-label">COMPLETION</span>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <span class="progress-pct" id="progressPct">0%</span>
</div>

<main id="mainContent">
  <!-- Sections injected by JS -->
  <div class="complete-banner" id="completeBanner">
    <h3>✔ PM Complete</h3>
    <p id="completeText">All items addressed — sign off and log this record.</p>
  </div>
</main>

<div class="summary-bar">
  <div class="stat"><span class="stat-val ok" id="statPass">0</span><span class="stat-label">Pass</span></div>
  <div class="divider"></div>
  <div class="stat"><span class="stat-val bad" id="statFail">0</span><span class="stat-label">Issues</span></div>
  <div class="divider"></div>
  <div class="stat"><span class="stat-val warn" id="statWarn">0</span><span class="stat-label">Monitor</span></div>
  <div class="divider"></div>
  <div class="stat"><span class="stat-val total" id="statTotal">0</span><span class="stat-label">Total</span></div>
  <div class="summary-actions">
    <button class="btn btn-danger" onclick="resetAll()">Reset</button>
    <button class="btn btn-primary" onclick="printReport()">Export Report</button>
  </div>
</div>

<script>
const SECTIONS = [
  {
    icon: '🔩',
    title: 'Glassware & Seals',
    items: [
      {
        label: 'Inspect evaporating flask for cracks or chips',
        sub: 'Check neck, base, and joint area under good lighting.',
        solution: {
          pass: 'Flask is clear, no visible damage. Clean and re-install.',
          fail: {
            title: '⚠ Replace Flask Immediately',

          },
          warn: {
            title: 'Minor Surface Mark — Monitor',
            body: 'If scratch is superficial (not through-wall), mark with tape and re-inspect next cycle. Do not run at full vacuum until confirmed safe. Consult supervisor if unsure.'

        }
      },
      {
        label: 'Check all PTFE/Teflon joints and connectors',
        sub: 'Look for wear, deformation, or discoloration on sealing faces.',
        solution: {
          pass: 'Joints are supple, white/translucent, and seat fully flush.',
          fail: {
            title: 'Replace Worn PTFE Components',
            body: 'Yellowed, cracked, or compressed PTFE will not seal properly, causing vacuum loss. Replace the specific joint or sleeve — these are consumables. Keep spares on hand. Ensure replacement is rated for your solvents.'
          },
          warn: {
            title: 'Slight Deformation — Lubricate & Monitor',
            body: 'Apply a thin film of PTFE-compatible vacuum grease to the joint. Re-seat and test vacuum. If vacuum hold degrades over the session, replace at next PM.'
          }
        }
      },
      {
        label: 'Inspect O-rings on vacuum seal and bump trap',
        sub: 'Check for brittleness, cracking, swelling or flat spots.',
        solution: {
          pass: 'O-rings are pliable, correctly seated, and show no chemical swelling.',
          fail: {
            title: 'Replace O-rings',
            body: 'Failed O-rings are a leading cause of vacuum loss. Replace with the correct size and material (Viton is preferred for most solvents; avoid standard Buna-N with halogenated solvents like DCM). Keep an O-ring kit on-site. Lightly grease the new O-ring before seating.'
          },
          warn: {
            title: 'Slight Wear — Grease & Note',
            body: 'Apply a very thin layer of high-vacuum grease. If leakage persists, replace. Budget for replacement at next monthly cycle.'

        }
      },
      {
        label: 'Check condenser glass for fouling or deposits',
        sub: 'Look inside the cold finger for crystalline residue or discoloration.',
        solution: {
          pass: 'Condenser glass is clear with no visible residue.',
          fail: {
            title: 'Clean Condenser',
            body: 'Deposits reduce heat exchange efficiency. Rinse with appropriate solvent (acetone, then IPA). For stubborn residue, soak with dilute acid wash or base bath per your SOP. Rinse thoroughly with DI water. Allow to dry completely before use.'

      }
    ]
  },
  {
    icon: '💧',
    title: 'Vacuum System',
    items: [
      {
        label: 'Perform vacuum hold test (target ≤ 5 mbar drift over 5 min)',
        sub: 'Close stopcock, pull full vacuum, isolate pump, observe gauge for 5 minutes.',
        solution: {
          pass: 'System holds vacuum within spec. No significant drift detected.',
          fail: {
            title: 'Locate and Fix Leak',
            body: 'A failing hold test means a leak somewhere in the system. Systematic check:\n1. Inspect evaporating flask joint first\n2. Check bump trap connections\n3. Inspect vacuum tubing for cracks (especially near fittings)\n4. Check the stopcock seating\n5. Use an ultrasonic detector or apply vacuum grease systematically to joints and listen for hiss reduction. Do not run samples until leak is found.'
          },
          warn: {
            title: 'Marginal — Investigate Before Next Run',
            body: 'Drift between 5–15 mbar over 5 min warrants inspection. Check and re-grease all joints. Re-test. If it remains marginal, escalate to a full leak check before production runs.'
          }
        }
      },
      {
        label: 'Inspect vacuum tubing and hose connections',
        sub: 'Check for kinks, brittleness, micro-cracks, or loose Barb fittings.',
        solution: {
          pass: 'Tubing is flexible, uniformly colored, firmly seated on all barbs.',
          fail: {
            title: 'Replace Affected Tubing',
            body: 'Vacuum tubing is a common failure point, especially if it has contact with aggressive solvents. Replace with appropriately rated tubing (e.g., PVC for general use, PTFE-lined for aggressive chemistries). Ensure inside diameter matches barb size — a loose fit will draw air.'
          }
        }
      },
      {
        label: 'Check vacuum pump oil level and clarity',
        sub: 'Oil should be at mid-mark on sight glass; golden/clear in color.',
        solution: {
          pass: 'Oil is at correct level and appears golden, no dark discoloration or emulsification.',
          fail: {
            title: 'Change Pump Oil',
            body: 'Milky/emulsified oil = solvent contamination. Dark oil = degraded. Drain completely while warm, allow to drain fully, refill with manufacturer-spec oil to correct level. If heavily contaminated, run a brief gas ballast purge cycle before refilling. Log oil change date.'

          warn: {
            title: 'Top Off & Monitor',
            body: 'Low oil level only: top up with matching pump oil grade. Do not mix oil types. If consumption is high, check for leaks around pump shaft seal.'

      {
        label: 'Run pump gas ballast cycle (if diaphragm: N/A)',
        sub: 'For oil-sealed rotary vane pumps: run ballast valve open for 15–20 min.',

          pass: 'Gas ballast cycle completed. Pump runs quietly with no unusual noise.',
          fail: {
            title: 'Pump Needs Service',
            body: 'If pump runs rough, rattles, or struggles to pull vacuum even after oil change and ballast: check inlet filter for blockage, check exhaust filter, inspect vanes if accessible. Consider professional service or replacement if performance does not recover.'
          }
        }
      }
    ]
  },
  {
    icon: '🌡️',
    title: 'Heating Bath',
    items: [
      {
        label: 'Verify bath temperature accuracy against calibrated reference thermometer',
        sub: 'Setpoint vs actual at 40°C and 60°C.',
        solution: {
          pass: 'Temperature within ±2°C of setpoint at both check points.',
          fail: {
            title: 'Recalibrate or Service Temperature Controller',
            body: 'An offset >2°C affects evaporation efficiency and reproducibility. Check the temperature probe — if visibly corroded or damaged, replace the probe first. If probe is OK, recalibrate the controller using offset adjustment per manufacturer manual. If controller is non-adjustable, use a correction label and log the offset.'
          },
          warn: {
            title: 'Minor Drift — Log and Monitor',
            body: 'An offset of 2–5°C should be logged. Apply a calibration offset correction to your set temperatures, and schedule a full calibration at next PM. Ensure the probe is fully submerged in the bath fluid.'
          }
        }
      },
      {
        label: 'Inspect bath fluid level and condition',
        sub: 'Water for <95°C; silicone oil for higher temps. Check for discoloration or contamination.',
        solution: {
          pass: 'Fluid is at correct level, clear/clean in appearance.',
          fail: {
            title: 'Replace Bath Fluid',
            body: 'Contaminated or discolored water can cause corrosion and inconsistent heating. Drain completely. If using water, consider adding a corrosion inhibitor. For silicone oil that has darkened significantly, replace — degraded oil loses thermal consistency. Dispose of old fluid per your site waste procedures.'
          }
        }
      },
      {
        label: 'Inspect bath exterior and drain valve for corrosion or leaks',
        sub: 'Check underneath bath and around the drain fitting.',
        solution: {
          pass: 'No corrosion, rust spots, or leaks visible.',
          fail: {
            title: 'Treat Corrosion / Fix Leak',
            body: 'Surface corrosion: treat and coat. Active leak at drain valve: replace valve or reseal with appropriate tape/sealant. A bath failure mid-run is a serious incident risk. If corrosion is structural, take unit out of service.'
          }
        }
      }
    ]
  },
  {
    icon: '❄️',
    title: 'Condenser & Chiller',
    items: [
      {
        label: 'Verify chiller setpoint is appropriate for solvent boiling point',
        sub: 'Coolant should typically be at least 20–30°C below condenser target temp.',
        solution: {
          pass: 'Chiller setpoint confirmed correct for current solvent applications.',
          fail: {
            title: 'Adjust Chiller Setpoint',
            body: 'Insufficient cooling = solvent losses to vacuum and environmental release. For volatile solvents (e.g., diethyl ether, DCM), set chiller to -10°C or lower. For ethanol, 0–5°C is typically sufficient. Check chiller performance — if it can\'t reach setpoint, inspect coolant level and compressor function.'
          }
        }
      },
      {
        label: 'Inspect coolant lines for leaks, kinks, or disconnection',
        sub: 'Trace both supply and return lines from chiller to condenser.',
        solution: {
          pass: 'Lines are intact, fully connected, and no coolant is visible on bench or floor.',
          fail: {
            title: 'Fix Coolant Leak Immediately',
            body: 'A coolant leak is both a slip hazard and an equipment damage risk. Identify source (usually at push-fit or barb connectors). Re-seat connectors or replace faulty fitting. Check coolant level in chiller reservoir after repair. Use correct coolant fluid — mixing types can cause precipitation.'
          }
        }
      },
      {
        label: 'Verify coolant flow reaches condenser (feel for cold condenser body)',
        sub: 'Condenser jacket should feel cold to the touch when chiller is running.',
        solution: {
          pass: 'Condenser jacket is uniformly cold — good flow confirmed.',
          fail: {
            title: 'Diagnose Flow Blockage',
            body: 'No cold at condenser usually means blocked or restricted flow. Check: (1) chiller pump is running, (2) lines are not kinked, (3) inlet/outlet not reversed, (4) no airlock in the loop. Purge air from system by briefly disconnecting the return line at the condenser and allowing fluid to flow through. Re-connect and recheck.'
          }
        }
      }
    ]
  },
  {
    icon: '⚙️',
    title: 'Motor & Drive Assembly',
    items: [
      {
        label: 'Check flask rotation — smooth, no grinding or wobble',
        sub: 'Run motor at mid-speed with an empty flask for 1 minute.',
        solution: {
          pass: 'Rotation is smooth and consistent across all speed settings.',
          fail: {
            title: 'Inspect Drive Belt and Bearings',
            body: 'Grinding = likely bearing wear. Wobble = worn or slipping drive belt, or misaligned flask clamp. Inspect the drive belt for cracking, glazing or stretching — replace if worn. Check that the flask socket clamp seats evenly. If bearing is failing, this requires motor service.'
          },
          warn: {
            title: 'Slight Noise — Lubricate & Monitor',
            body: 'Minor squeaking can result from dry motor bearings. Apply a small amount of appropriate lubricant if accessible. If noise persists or worsens, escalate to a full mechanical inspection.'
          }
        }
      },
      {
        label: 'Inspect drive belt condition (if belt-driven unit)',
        sub: 'Look for cracking, fraying, glazing, or incorrect tension.',
        solution: {
          pass: 'Belt is in good condition with correct tension — no visible wear.',
          fail: {
            title: 'Replace Drive Belt',
            body: 'A worn belt will slip under load, reducing rotation speed and consistency. Replace with manufacturer-specified belt. Check pulley wheels for wear or debris. Tension new belt to spec — too tight stresses bearings, too loose causes slip.'
          }
        }
      },
      {
        label: 'Verify motor speed control responds correctly across full range',
        sub: 'Sweep from minimum to maximum speed; RPM should increase smoothly.',
        solution: {
          pass: 'Speed control is linear and responsive with no dead zones.',
          fail: {
            title: 'Service Speed Controller',
            body: 'Erratic speed control or dead zones in the dial/controller indicate a faulty potentiometer or control board. Check connections first. If a digital controller, run a factory reset if available. If the motor itself is stuttering (not the controller), inspect brushes if it is a brushed motor.'
          }
        }
      }
    ]
  },
  {
    icon: '🧹',
    title: 'General Cleaning & Safety',
    items: [
      {
        label: 'Clean all exterior surfaces and drip trays',
        sub: 'Remove solvent residue, crystallized material, and general bench contamination.',
        solution: {
          pass: 'All surfaces clean; drip tray emptied and wiped down.',
          fail: {
            title: 'Deep Clean Required',
            body: 'Solvent residue on heated surfaces is a fire hazard. Use appropriate solvent wipes. Crystallized material near joints can cause glass to bind or break on removal. Soak with appropriate solvent before attempting to disassemble. Check drip tray — any residue should be disposed of correctly.'

            title: 'Replace Missing/Damaged Labels',

      },
      {

            body: 'A PM without a record did not happen from a compliance standpoint. Complete the log with: date, unit ID, tech name, items checked, issues found, corrective actions, and next PM due date. If issues were escalated, note the escalation.'

// State
const state = {};

function initState() {
  SECTIONS.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      const key = `${si}-${ii}`;
      if (!state[key]) state[key] = { status: 'pending', note: '' };
    });
  });
}

function renderSections() {
  const main = document.getElementById('mainContent');
  // Remove old sections
  main.querySelectorAll('.section').forEach(el => el.remove());
  const banner = document.getElementById('completeBanner');

  SECTIONS.forEach((sec, si) => {
    const div = document.createElement('div');
    div.className = 'section';
    div.id = `sec-${si}`;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `
      <span class="section-icon">${sec.icon}</span>
      <span class="section-title">${sec.title}</span>
      <span class="section-count" id="sec-count-${si}">0/${sec.items.length}</span>
      <span class="section-chevron">▼</span>
    `;
    hdr.addEventListener('click', () => div.classList.toggle('collapsed'));
    div.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'section-body';

    sec.items.forEach((item, ii) => {
      const key = `${si}-${ii}`;
      const s = state[key];

      const itemDiv = document.createElement('div');
      itemDiv.className = `check-item ${s.status !== 'pending' ? s.status === 'pass' ? 'checked' : s.status === 'fail' ? 'flagged' : s.status === 'warn' ? 'warn' : '' : ''}`;
      itemDiv.id = `item-${key}`;

      const checkSymbol = s.status === 'pass' ? '✓' : s.status === 'fail' ? '✕' : s.status === 'warn' ? '!' : '';

      itemDiv.innerHTML = `
        <div class="check-row" onclick="toggleSolution('${key}')">
          <div class="check-box">${checkSymbol}</div>
          <div class="check-content">
            <div class="check-label">${item.label}</div>
            <div class="check-sub">${item.sub}</div>
            <div class="check-actions">
              <span class="tag tag-pass" onclick="event.stopPropagation();setStatus('${key}','pass')">✓ Pass</span>
              <span class="tag tag-fail" onclick="event.stopPropagation();setStatus('${key}','fail')">✕ Issue</span>
              ${item.solution.warn ? `<span class="tag tag-warn" onclick="event.stopPropagation();setStatus('${key}','warn')">! Monitor</span>` : ''}
              <span class="tag tag-info" onclick="event.stopPropagation();toggleSolution('${key}')">ℹ Solution</span>
            </div>
          </div>
        </div>
        <div class="solution-panel ${s.status === 'fail' ? 'danger-panel visible' : s.status === 'warn' ? 'warn-panel visible' : s.status === 'pass' ? 'visible' : ''}" id="sol-${key}">
          ${getSolutionHTML(item, s.status)}
        </div>
        <div class="notes-row">
          <input type="text" placeholder="Notes / observations..." value="${s.note}" oninput="saveNote('${key}',this.value)">
        </div>
      `;

      body.appendChild(itemDiv);
    });

    div.appendChild(body);
    main.insertBefore(div, banner);
  });

  updateProgress();
}

function getSolutionHTML(item, status) {
  if (status === 'pass' && item.solution.pass) {
    return `<h4>✔ Pass Criteria Met</h4><p>${item.solution.pass}</p>`;
  }
  if (status === 'fail' && item.solution.fail) {
    return `<h4>${item.solution.fail.title}</h4><p style="white-space:pre-line">${item.solution.fail.body}</p>`;
  }
  if (status === 'warn' && item.solution.warn) {
    return `<h4>${item.solution.warn.title}</h4><p>${item.solution.warn.body}</p>`;
  }
  if (status === 'pending') {
    // Show all available solutions
    let html = '';
    if (item.solution.pass) html += `<h4>✔ If Pass</h4><p>${item.solution.pass}</p>`;
    if (item.solution.fail) html += `<h4 style="margin-top:8px">${item.solution.fail.title}</h4><p style="white-space:pre-line">${item.solution.fail.body}</p>`;
    if (item.solution.warn) html += `<h4 style="margin-top:8px">${item.solution.warn.title}</h4><p>${item.solution.warn.body}</p>`;
    return html;
  }
  return '';
}

function toggleSolution(key) {
  const panel = document.getElementById(`sol-${key}`);
  panel.classList.toggle('visible');
}

function setStatus(key, status) {
  const [si, ii] = key.split('-').map(Number);
  const item = SECTIONS[si].items[ii];
  state[key].status = status;

  const itemDiv = document.getElementById(`item-${key}`);
  itemDiv.className = `check-item ${status === 'pass' ? 'checked' : status === 'fail' ? 'flagged' : status === 'warn' ? 'warn' : ''}`;

  const box = itemDiv.querySelector('.check-box');
  box.textContent = status === 'pass' ? '✓' : status === 'fail' ? '✕' : status === 'warn' ? '!' : '';

  const panel = document.getElementById(`sol-${key}`);
  panel.className = `solution-panel ${status === 'fail' ? 'danger-panel' : status === 'warn' ? 'warn-panel' : ''} visible`;
  panel.innerHTML = getSolutionHTML(item, status);

  updateProgress();
}

function saveNote(key, val) {
  state[key].note = val;
}

function updateProgress() {
  let pass = 0, fail = 0, warn = 0, total = 0;
  const sectionCounts = {};

  SECTIONS.forEach((sec, si) => {
    let secDone = 0;
    sec.items.forEach((_, ii) => {
      const key = `${si}-${ii}`;
      const s = state[key].status;
      total++;
      if (s === 'pass') { pass++; secDone++; }
      else if (s === 'fail') { fail++; secDone++; }
      else if (s === 'warn') { warn++; secDone++; }
    });
    sectionCounts[si] = secDone;
  });

  const done = pass + fail + warn;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('statPass').textContent = pass;
  document.getElementById('statFail').textContent = fail;
  document.getElementById('statWarn').textContent = warn;
  document.getElementById('statTotal').textContent = total;

  SECTIONS.forEach((sec, si) => {
    const el = document.getElementById(`sec-count-${si}`);
    if (el) el.textContent = `${sectionCounts[si]}/${sec.items.length}`;
  });

  const banner = document.getElementById('completeBanner');
  if (done === total && total > 0) {
    banner.classList.add('visible');
    const tech = document.getElementById('techName').value || 'Technician';
    const machine = document.getElementById('machineSelect').value;
    const date = document.getElementById('pmDate').value;
    document.getElementById('completeText').textContent =
      `${machine} — ${tech} — ${date} | Pass: ${pass} | Issues: ${fail} | Monitor: ${warn}`;
  } else {
    banner.classList.remove('visible');
  }
}

function resetAll() {
  if (!confirm('Reset all checks for this PM? This cannot be undone.')) return;
  Object.keys(state).forEach(k => { state[k] = { status: 'pending', note: '' }; });
  renderSections();
}

function printReport() {
  const machine = document.getElementById('machineSelect').value;
  const tech = document.getElementById('techName').value || '—';
  const date = document.getElementById('pmDate').value || '—';

  let rows = '';
  SECTIONS.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      const key = `${si}-${ii}`;
      const s = state[key];
      const statusLabel = s.status === 'pass' ? '✓ PASS' : s.status === 'fail' ? '✕ ISSUE' : s.status === 'warn' ? '! MONITOR' : '— PENDING';
      rows += `<tr>
        <td>${sec.title}</td>
        <td>${item.label}</td>
        <td style="color:${s.status==='pass'?'#00aa66':s.status==='fail'?'#cc2233':s.status==='warn'?'#cc8800':'#888'};font-weight:bold">${statusLabel}</td>
        <td>${s.note || ''}</td>
      </tr>`;
    });
  });

  const html = `<!DOCTYPE html><html><head><title>Rotovap PM Report</title>
  <style>body{font-family:Arial,sans-serif;padding:24px;color:#222}
  h2{margin-bottom:4px}p{margin:2px 0;color:#555}
  table{width:100%;border-collapse:collapse;margin-top:16px}
  th{background:#1a2a3a;color:#fff;padding:8px;text-align:left;font-size:12px}
  td{padding:7px 8px;font-size:12px;border-bottom:1px solid #ddd;vertical-align:top}
  tr:nth-child(even)td{background:#f5f7fa}
  </style></head><body>
  <h2>Rotovap Preventive Maintenance Report</h2>
  <p><strong>Machine:</strong> ${machine} &nbsp; <strong>Technician:</strong> ${tech} &nbsp; <strong>Date:</strong> ${date}</p>
  <table><thead><tr><th>Section</th><th>Check Item</th><th>Status</th><th>Notes</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <p style="margin-top:16px;font-size:11px;color:#999">Generated by Rotovap PM Checklist Tool</p>
  </body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  setTimeout(() => win.print(), 500);
}

// Set today's date
const today = new Date();
document.getElementById('pmDate').value = today.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});

initState();
renderSections();
</script>
</body>
</html>
